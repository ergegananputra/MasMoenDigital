services:
  app:
    build: .
    container_name: mas_moen_digital_website
    restart: unless-stopped
    ports:
      - 5080:8000
    env_file:
      - .env
    environment:
      - FRANKENPHP_CONFIG=worker ./public/index.php
      - SERVER_NAME=:80
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mysql
    networks:
      - mmd_network

  mysql:
    image: mysql:8.0
    container_name: mysql8_mmd
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mmd_network

volumes:
  caddy_data:
  caddy_config:
  db_data:

networks:
  mmd_network:
